server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # This line is the magic: it redirects all requests to index.html 
        # so React Router can handle them.
        try_files $uri $uri/ /index.html;
    }

    # Optional: Proxy API requests to your FastAPI backend
    # location /api/ {
    #     proxy_pass https://your-backend-url.up.railway.app/;
    # }
}